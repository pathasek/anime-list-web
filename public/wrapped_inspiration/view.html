<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Inspirace MAL Wrapped</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #e0e0e0;
            padding: 20px;
        }
        h1, h2 {
            color: #818cf8;
        }
        .slide-group {
            margin-bottom: 50px;
        }
        .slide-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: inline-block;
            vertical-align: top;
            width: 320px;
            margin-right: 15px;
        }
        img {
            max-width: 100%;
            border-radius: 4px;
            border: 1px solid #444;
            display: block;
            margin-top: 10px;
        }
        .name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #f3f4f6;
        }
    </style>
</head>
<body>
    <h1>MAL Wrapped - Inspirační screenshoty</h1>
    
    <h2>Nápověda / Informace k Wrapped</h2>
    <div class="slide-group">
        <div class="slide-card">
            <div class="name">INFO_1_MAL.jpg</div>
            <img src="./INFO_1_MAL.jpg">
        </div>
        <div class="slide-card">
            <div class="name">INFO_2_MAL.jpg</div>
            <img src="./INFO_2_MAL.jpg">
        </div>
        <div class="slide-card">
            <div class="name">INFO_3_MAL.jpg</div>
            <img src="./INFO_3_MAL.jpg">
        </div>
        <div class="slide-card">
            <div class="name">INFO_4_MAL.jpg</div>
            <img src="./INFO_4_MAL.jpg">
        </div>
        <div class="slide-card">
            <div class="name">INFO_5_MAL.jpg</div>
            <img src="./INFO_5_MAL.jpg">
        </div>
    </div>

    <h2>Jednotlivé slidy (01 - 20)</h2>
    <div class="slide-group">
        <script>
            for (let i = 1; i <= 20; i++) {
                const name = i < 10 ? '0' + i + '_MAL.jpg' : i + '_MAL.jpg';
                document.write(`
                    <div class="slide-card">
                        <div class="name">${name}</div>
                        <img src="./${name}">
                    </div>
                `);
            }
        </script>
    </div>
</body>
</html>
